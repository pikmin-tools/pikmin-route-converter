<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>種花路線座標轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto space-y-6">
        <!-- 標題區塊 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h1 class="text-2xl font-bold flex items-center gap-2 text-indigo-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                種花路線座標轉換器
            </h1>
            <p class="text-slate-500 mt-2 text-sm">輸入中心點座標，自動產生半徑 30m 的繞圈八角形路線，並輸出純座標文字。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 左側：輸入區 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full">
                <label class="font-semibold text-slate-700 mb-3 flex justify-between items-center">
                    <span>📍 輸入中心點座標</span>
                    <span class="text-xs font-normal text-slate-400">支援逗號、空格或 Tab 分隔</span>
                </label>
                <textarea id="input-coords" class="w-full flex-grow min-h-[300px] p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent font-mono text-sm resize-none" placeholder="例如：&#10;23.963509, 121.598653&#10;23.962394, 121.598788&#10;23.961857, 121.598571">23.963509, 121.598653
23.962394, 121.598788
23.961857, 121.598571</textarea>
                
                <div class="mt-4 p-4 bg-indigo-50 rounded-xl border border-indigo-100 space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-medium text-indigo-900">轉換模式</label>
                        <select id="mode" class="bg-white border border-indigo-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none">
                            <option value="flower">🌸 種花路線 (8點繞圈)</option>
                            <option value="flower-return">🔄 繞圈後回中心點</option>
                            <option value="direct">➡️ 一般路線 (點對點直連)</option>
                        </select>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-medium text-indigo-900">繞圈半徑 (公尺)</label>
                        <input type="number" id="radius" value="30" class="bg-white border border-indigo-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-24 p-2 text-center outline-none">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-medium text-indigo-900">最佳化路線排序</label>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="optimize" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                            <span class="ml-3 text-xs text-slate-500">自動就近連線</span>
                        </label>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="text-sm font-medium text-indigo-900">輸出格式</label>
                        <select id="format" class="bg-white border border-indigo-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none">
                            <option value="text">📄 純座標 (一行一行)</option>
                            <option value="gpx">🗺️ GPX 檔案 (XML)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 右側：輸出區 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col h-full relative">
                <label class="font-semibold text-slate-700 mb-3 flex justify-between items-center">
                    <span>✨ 產出結果</span>
                    <span id="point-count" class="text-xs font-normal bg-slate-100 px-2 py-1 rounded-md text-slate-500">0 個點</span>
                </label>
                <textarea id="output-result" readonly class="w-full flex-grow min-h-[300px] p-4 bg-slate-800 text-green-400 border border-slate-700 rounded-xl focus:outline-none font-mono text-sm resize-none"></textarea>
                
                <div class="mt-4 flex gap-3">
                    <button onclick="copyResult()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-150 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        複製結果
                    </button>
                    <button onclick="downloadFile()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 px-4 rounded-xl transition duration-150 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        下載檔案
                    </button>
                </div>

                <!-- 複製成功的提示訊息 -->
                <div id="toast" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-300">
                    已複製到剪貼簿！
                </div>
            </div>
        </div>
    </div>

    <script>
        // 經緯度位移計算 (Haversine formula 延伸)
        function destinationPoint(lat, lon, distance_m, bearing_deg) {
            const R = 6378137; // 地球半徑 (公尺)
            const lat1 = lat * Math.PI / 180;
            const lon1 = lon * Math.PI / 180;
            const brng = bearing_deg * Math.PI / 180;

            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distance_m / R) +
                                 Math.cos(lat1) * Math.sin(distance_m / R) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(distance_m / R) * Math.cos(lat1),
                                         Math.cos(distance_m / R) - Math.sin(lat1) * Math.sin(lat2));

            return {
                lat: lat2 * 180 / Math.PI,
                lon: lon2 * 180 / Math.PI
            };
        }

        // 計算兩點之間的距離 (Haversine formula 返回公尺)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6378137;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // 主要產生邏輯
        function generateRoute() {
            const inputText = document.getElementById('input-coords').value;
            const mode = document.getElementById('mode').value;
            const radius = parseFloat(document.getElementById('radius').value) || 30;
            const format = document.getElementById('format').value;
            const optimize = document.getElementById('optimize').checked;

            // 解析輸入座標
            const lines = inputText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let inputCoords = [];

            for (const line of lines) {
                // 支援多種分隔符號 (逗號、空白、Tab)
                const parts = line.split(/[,\s\t]+/).filter(p => p.length > 0);
                if (parts.length >= 2) {
                    const lat = parseFloat(parts[0]);
                    const lon = parseFloat(parts[1]);
                    if (!isNaN(lat) && !isNaN(lon)) {
                        inputCoords.push({lat, lon});
                    }
                }
            }

            // 執行路線最佳化 (貪婪演算法：尋找最近的點)
            if (optimize && inputCoords.length > 1) {
                const optimizedCoords = [inputCoords[0]]; // 保持第一個點不變當作起點
                const unvisited = inputCoords.slice(1);

                while (unvisited.length > 0) {
                    let current = optimizedCoords[optimizedCoords.length - 1];
                    let nearestIdx = 0;
                    let minDistance = Infinity;

                    for (let i = 0; i < unvisited.length; i++) {
                        let dist = getDistance(current.lat, current.lon, unvisited[i].lat, unvisited[i].lon);
                        if (dist < minDistance) {
                            minDistance = dist;
                            nearestIdx = i;
                        }
                    }

                    optimizedCoords.push(unvisited[nearestIdx]);
                    unvisited.splice(nearestIdx, 1);
                }
                inputCoords = optimizedCoords; // 替換為排序好的座標陣列
            }

            let outputPoints = [];

            // 產生路線點
            if (mode === 'flower' || mode === 'flower-return') {
                // 新增：在整個路線的最前面，加入一個距離第一個中心點 60 公尺的起始點 (預設放在正北方)
                if (inputCoords.length > 0) {
                    const firstCenter = inputCoords[0];
                    const entryPoint = destinationPoint(firstCenter.lat, firstCenter.lon, 60, 0);
                    outputPoints.push(entryPoint);
                }

                for (const center of inputCoords) {
                    const sides = 8; // 八角形
                    const loopPoints = [];
                    // 為了盡量符合原版的起始角度，我們從 0 度(正北)開始順時針畫八角形
                    for (let i = 0; i < sides; i++) {
                        const bearing = i * (360 / sides);
                        loopPoints.push(destinationPoint(center.lat, center.lon, radius, bearing));
                    }
                    loopPoints.push(loopPoints[0]); // 繞回原點形成封閉迴圈
                    outputPoints.push(...loopPoints);

                    // 如果是「繞圈後回中心點」模式，在繞完八角形後把中心點加進去
                    if (mode === 'flower-return') {
                        outputPoints.push({ lat: center.lat, lon: center.lon });
                    }
                }
            } else {
                outputPoints = inputCoords;
            }

            // 格式化輸出
            let result = '';
            if (format === 'text') {
                result = outputPoints.map(p => `${p.lat.toFixed(7)}, ${p.lon.toFixed(7)}`).join('\n');
            } else {
                const trkpts = outputPoints.map(p => `    <trkpt lat="${p.lat.toFixed(7)}" lon="${p.lon.toFixed(7)}"></trkpt>`).join('\n');
                result = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="flower-route-generator">
  <metadata><name>種花版_${new Date().toISOString().slice(5,16).replace(/[-T:]/g,'')}</name></metadata>
  <trk><name>種花路線</name><trkseg>
${trkpts}
  </trkseg></trk>
</gpx>`;
            }

            // 更新 UI
            document.getElementById('output-result').value = result;
            document.getElementById('point-count').textContent = `共 ${outputPoints.length} 個點`;
        }

        // 複製功能
        function copyResult() {
            const textarea = document.getElementById('output-result');
            textarea.select();
            document.execCommand('copy');
            
            // 顯示提示
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        // 下載功能
        function downloadFile() {
            const content = document.getElementById('output-result').value;
            const format = document.getElementById('format').value;
            const extension = format === 'gpx' ? 'gpx' : 'txt';
            const timestamp = new Date().toISOString().slice(5,16).replace(/[-T:]/g,'');
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Route_${timestamp}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 綁定事件：當輸入或設定改變時，自動重新計算
        document.getElementById('input-coords').addEventListener('input', generateRoute);
        document.getElementById('mode').addEventListener('change', generateRoute);
        document.getElementById('radius').addEventListener('input', generateRoute);
        document.getElementById('optimize').addEventListener('change', generateRoute);
        document.getElementById('format').addEventListener('change', generateRoute);

        // 初始執行一次
        generateRoute();
    </script>
</body>
</html>
